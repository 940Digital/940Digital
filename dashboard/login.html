<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Client Login | 940Digital</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/dashboard/dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    body.dash.login-body { display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .login-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 2rem 1.75rem; width: 100%; max-width: 380px; }
    .login-card h1 { font-family: var(--font-display); font-size: 1.3rem; margin: 0 0 .3rem; }
    .login-card p.sub { color: var(--brown-muted); font-size: .85rem; margin: 0 0 1.5rem; }
    .login-card label { display: block; font-size: .8rem; font-weight: 600; margin: .9rem 0 .3rem; }
    .login-card input { width: 100%; padding: .6rem .75rem; border: 1px solid #ddd6c9; border-radius: 4px; font-size: .95rem; font-family: var(--font-body); }
    .pw-field { position: relative; }
    .pw-field input { padding-right: 3.2rem; }
    .pw-toggle { position: absolute; right: .5rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--brown-muted); font-size: .78rem; font-weight: 600; cursor: pointer; padding: .3rem .4rem; }
    .pw-toggle:hover { color: var(--blue-accent); }
    .otp-boxes { display: grid; grid-template-columns: repeat(6, 1fr); gap: .5rem; margin-top: .3rem; }
    .otp-boxes input { width: 100%; padding: .8rem 0; text-align: center; font-size: 1.4rem; font-weight: 700; font-family: var(--font-display); border: 1px solid #ddd6c9; border-radius: 6px; }
    .otp-boxes input:focus { outline: none; border-color: var(--blue-accent); box-shadow: 0 0 0 3px rgba(49,148,224,.18); }
    .login-card button[type="submit"] { width: 100%; margin-top: 1.4rem; }
    .login-msg { margin-top: 1rem; font-size: .85rem; line-height: 1.4; }
    .login-msg.err { color: #DC2626; }
    .login-msg.info { color: var(--brown-muted); }
    .forgot-link { display: none; margin-top: .6rem; font-size: .82rem; color: var(--blue-accent); text-decoration: none; }
    .forgot-link.show { display: inline-block; }
    .otp-step { display: none; }
    .otp-step.active { display: block; }
    .password-step.hidden { display: none; }
    .set-password-step { display: none; }
    .set-password-step.active { display: block; }
  </style>
</head>
<body class="dash login-body">

  <div class="login-card">
    <h1>940Digital Dashboard</h1>
    <p class="sub">Sign in to view your site's performance.</p>

    <form id="setPasswordStep" class="set-password-step">
      <p class="sub" style="margin-top:0">Set a password for your account to finish setting up.</p>
      <label for="newPassword">New password</label>
      <div class="pw-field">
        <input type="password" id="newPassword" required autocomplete="new-password" minlength="8">
        <button type="button" class="pw-toggle" data-toggle-for="newPassword">Show</button>
      </div>
      <label for="confirmPassword">Confirm password</label>
      <div class="pw-field">
        <input type="password" id="confirmPassword" required autocomplete="new-password" minlength="8">
        <button type="button" class="pw-toggle" data-toggle-for="confirmPassword">Show</button>
      </div>
      <button type="submit" class="btn btn-primary">Set password</button>
    </form>

    <form id="passwordStep" class="password-step">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email">
      <label for="password">Password</label>
      <div class="pw-field">
        <input type="password" id="password" required autocomplete="current-password">
        <button type="button" class="pw-toggle" data-toggle-for="password">Show</button>
      </div>
      <button type="submit" class="btn btn-primary">Sign in</button>
      <a href="#" id="forgotLink" class="forgot-link">Forgot your password?</a>
    </form>

    <form id="otpStep" class="otp-step">
      <p class="sub" style="margin-top:0">Enter the 6-digit code we just emailed you to finish signing in.</p>
      <label>Verification code</label>
      <div class="otp-boxes" id="otpBoxes">
        <input type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="1" pattern="[0-9]">
        <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]">
        <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]">
        <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]">
        <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]">
        <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]">
      </div>
      <button type="submit" class="btn btn-primary">Verify &amp; sign in</button>
    </form>

    <div id="loginMsg" class="login-msg"></div>
  </div>

  <script type="module" src="/dashboard/login.js"></script>
</body>
</html>
